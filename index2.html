<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DHL Operational Control | Dashboard</title>

<style>
:root{
    --dhl-red:#D40511;
    --dhl-yellow:#FFCC00;
    --bg:#f5f5f5;
}

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:var(--bg);
}

header{
    background:var(--dhl-yellow);
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

header h1{
    margin:0;
    color:var(--dhl-red);
}

.logout-btn{
    border:none;
    background:var(--dhl-red);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:22px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.info-row{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:14px 0;
    gap:20px;
}

.info-row strong{
    color:#555;
}

.info-row span{
    font-weight:bold;
    color:var(--dhl-red);
}

.status{
    margin-top:25px;
    padding:18px;
    border-radius:16px;
    background:#fff7cc;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>📊 DHL Operational Control</h1>

    <button class="logout-btn" onclick="logout()">
        Cerrar sesión
    </button>
</header>

<div class="container">

    <div class="card">

        <h2 id="welcomeTitle">Bienvenido</h2>

        <div class="info-row">
            <strong>Empleado</strong>
            <span id="employeeId">-</span>
        </div>

        <div class="info-row">
            <strong>Nombre</strong>
            <span id="userName">-</span>
        </div>

        <div class="info-row">
            <strong>Rol</strong>
            <span id="userRole">-</span>
        </div>

        <div class="info-row">
            <strong>Área</strong>
            <span id="userArea">-</span>
        </div>

        <div class="info-row">
            <strong>Nave</strong>
            <span id="userWarehouse">-</span>
        </div>

        <div class="status">
            ✅ Sesión validada correctamente. Dashboard temporal activo.
        </div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4yHubTO4ZPn2H80I1fG7H6qeR7SavNbM",
  authDomain: "dhl-operational-control.firebaseapp.com",
  projectId: "dhl-operational-control",
  storageBucket: "dhl-operational-control.firebasestorage.app",
  messagingSenderId: "830487097530",
  appId: "1:830487097530:web:41e01b4d396678f0819283"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const savedUser =
    localStorage.getItem("operationalUser");

if(!savedUser){
    window.location.href="index.html";
}

const currentUser =
    JSON.parse(savedUser);

document.getElementById("welcomeTitle").innerText =
    `Bienvenido ${currentUser.name}`;

document.getElementById("employeeId").innerText =
    currentUser.employeeId;

document.getElementById("userName").innerText =
    currentUser.name;

document.getElementById("userRole").innerText =
    currentUser.role;

document.getElementById("userArea").innerText =
    currentUser.area;

document.getElementById("userWarehouse").innerText =
    currentUser.warehouse;

async function logout(){

    await signOut(auth);

    localStorage.removeItem("operationalUser");

    window.location.href="index.html";

}

window.logout=logout;

</script>

</body>
</html>
