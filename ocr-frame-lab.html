<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL OCR Frame Lab V3</title>

<style>
:root{--dhl-red:#D40511;--dhl-yellow:#FFCC00;--ok:#1f7a1f;}
*{box-sizing:border-box;font-family:Arial,sans-serif;}
body{margin:0;background:#111;color:white;}
header{
    height:52px;background:var(--dhl-yellow);color:var(--dhl-red);
    display:flex;align-items:center;justify-content:center;font-weight:900;
}
.lab-wrap{height:calc(100vh - 52px);display:flex;flex-direction:column;overflow:hidden;}
.camera-stage{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;}
video{width:100%;height:100%;object-fit:cover;}
.guide-frame{
    position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
    width:92%;max-width:760px;aspect-ratio:1.62/1;
    border:4px solid white;border-radius:18px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.45),0 0 18px rgba(255,255,255,.35);
    pointer-events:none;
}
.guide-frame::before,.guide-frame::after{
    content:"";position:absolute;width:34px;height:34px;
    border-color:var(--dhl-yellow);border-style:solid;
}
.guide-frame::before{left:-5px;top:-5px;border-width:5px 0 0 5px;border-radius:16px 0 0 0;}
.guide-frame::after{right:-5px;bottom:-5px;border-width:0 5px 5px 0;border-radius:0 0 16px 0;}
.guide-title{
    position:absolute;top:14px;left:0;width:100%;padding:0 18px;
    text-align:center;font-weight:900;font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.9);
}
.guide-help{
    position:absolute;bottom:16px;left:0;width:100%;padding:0 20px;text-align:center;
    font-size:13px;font-weight:bold;color:#eee;text-shadow:0 2px 6px rgba(0,0,0,.9);
}
.bottom-panel{
    background:#171717;padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
button{border:none;border-radius:14px;padding:13px 8px;font-weight:900;cursor:pointer;font-size:14px;}
.primary-btn{background:var(--dhl-red);color:white;}
.secondary-btn{background:#eee;color:#111;}
.ok-btn{background:var(--ok);color:white;}
.status{grid-column:1/-1;font-size:12px;color:#ddd;text-align:center;font-weight:bold;min-height:18px;}

.results{display:none;height:calc(100vh - 52px);overflow:auto;background:#111;padding:12px;}
.result-card{background:#1d1d1d;border-radius:18px;padding:12px;margin-bottom:12px;}
.result-card h3{margin:0 0 10px;color:var(--dhl-yellow);}
.result-card img{width:100%;border-radius:14px;border:2px solid white;display:block;}
.result-info{font-size:13px;color:#ddd;line-height:1.45;}
.actions{display:flex;gap:8px;margin-bottom:12px;}
.actions button{flex:1;}
canvas{display:none;}
</style>
</head>

<body>

<header>📷 DHL OCR Frame Lab V3</header>

<div class="lab-wrap" id="cameraView">
    <div class="camera-stage" id="cameraStage">
        <video id="cameraVideo" autoplay playsinline muted></video>

        <div class="guide-title">Enmarca la etiqueta completa</div>
        <div class="guide-frame" id="guideFrame"></div>
        <div class="guide-help">
            El sistema recortará el marco y estimará la tabla POS / SEC / PARTE.
        </div>
    </div>

    <div class="bottom-panel">
        <button class="secondary-btn" onclick="startCamera()">Cámara</button>
        <button class="primary-btn" onclick="captureAndCrop()">Tomar</button>
        <button class="ok-btn" onclick="showResults()">Ver resultado</button>
        <div class="status" id="status">Laboratorio aislado. No usa Firebase ni Containers.</div>
    </div>
</div>

<div class="results" id="resultsView">
    <div class="actions">
        <button class="secondary-btn" onclick="backToCamera()">Repetir foto</button>
    </div>

    <div class="result-card">
        <h3>1. Recorte PEDALES estimado</h3>
        <img id="tablePreview" alt="Recorte tabla PEDALES">
        <div class="result-info" id="tableInfo"></div>
    </div>

    <div class="result-card">
        <h3>2. Recorte del marco completo</h3>
        <img id="cropPreview" alt="Recorte marco">
        <div class="result-info" id="cropInfo"></div>
    </div>

    <div class="result-card">
        <h3>3. Foto completa capturada</h3>
        <img id="fullPreview" alt="Foto completa">
        <div class="result-info" id="fullInfo"></div>
    </div>
</div>

<canvas id="fullCanvas"></canvas>
<canvas id="cropCanvas"></canvas>
<canvas id="tableCanvas"></canvas>

<script>
let stream=null;
let fullImageBase64="";
let cropImageBase64="";
let tableImageBase64="";

async function startCamera(){
    const status=document.getElementById("status");
    try{
        stopCamera();
        status.innerText="Solicitando cámara trasera...";
        stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{ideal:"environment"},
                width:{ideal:1920},
                height:{ideal:1080}
            },
            audio:false
        });
        const video=document.getElementById("cameraVideo");
        video.srcObject=stream;
        await video.play();
        status.innerText="Cámara activa. Encuadra la etiqueta completa.";
    }catch(error){
        console.error(error);
        status.innerText="No fue posible abrir la cámara. Usa HTTPS/GitHub Pages y revisa permisos.";
    }
}

function stopCamera(){
    if(!stream){return;}
    stream.getTracks().forEach(track=>track.stop());
    stream=null;
}

function captureAndCrop(){
    const video=document.getElementById("cameraVideo");
    const guide=document.getElementById("guideFrame");
    const stage=document.getElementById("cameraStage");
    const status=document.getElementById("status");

    if(!video.videoWidth || !video.videoHeight){
        status.innerText="Primero inicia la cámara.";
        return;
    }

    const fullCanvas=document.getElementById("fullCanvas");
    const cropCanvas=document.getElementById("cropCanvas");
    const tableCanvas=document.getElementById("tableCanvas");

    fullCanvas.width=video.videoWidth;
    fullCanvas.height=video.videoHeight;

    fullCanvas.getContext("2d").drawImage(
        video,0,0,fullCanvas.width,fullCanvas.height
    );

    const stageRect=stage.getBoundingClientRect();
    const guideRect=guide.getBoundingClientRect();

    const videoRatio=video.videoWidth/video.videoHeight;
    const stageRatio=stageRect.width/stageRect.height;

    let renderedVideoWidth,renderedVideoHeight,offsetX,offsetY;

    if(videoRatio>stageRatio){
        renderedVideoHeight=stageRect.height;
        renderedVideoWidth=stageRect.height*videoRatio;
        offsetX=(stageRect.width-renderedVideoWidth)/2;
        offsetY=0;
    }else{
        renderedVideoWidth=stageRect.width;
        renderedVideoHeight=stageRect.width/videoRatio;
        offsetX=0;
        offsetY=(stageRect.height-renderedVideoHeight)/2;
    }

    const scaleX=video.videoWidth/renderedVideoWidth;
    const scaleY=video.videoHeight/renderedVideoHeight;

    let sx=(guideRect.left-stageRect.left-offsetX)*scaleX;
    let sy=(guideRect.top-stageRect.top-offsetY)*scaleY;
    let sw=guideRect.width*scaleX;
    let sh=guideRect.height*scaleY;

    sx=Math.max(0,sx);
    sy=Math.max(0,sy);
    sw=Math.min(video.videoWidth-sx,sw);
    sh=Math.min(video.videoHeight-sy,sh);

    cropCanvas.width=Math.round(sw);
    cropCanvas.height=Math.round(sh);

    cropCanvas.getContext("2d").drawImage(
        video,sx,sy,sw,sh,0,0,cropCanvas.width,cropCanvas.height
    );

    /*
        Recorte PEDALES estimado dentro del marco:
        - quita encabezado superior de etiqueta
        - quita pie inferior
        - conserva tabla POS / SEC / NUM PARTE
        Estos valores se calibran visualmente en lab.
    */
    const tableX=cropCanvas.width*0.03;
    const tableY=cropCanvas.height*0.36;
    const tableW=cropCanvas.width*0.78;
    const tableH=cropCanvas.height*0.56;

    tableCanvas.width=Math.round(tableW);
    tableCanvas.height=Math.round(tableH);

    tableCanvas.getContext("2d").drawImage(
        cropCanvas,
        tableX,tableY,tableW,tableH,
        0,0,tableCanvas.width,tableCanvas.height
    );

    saveCanvasAsImages(fullCanvas,cropCanvas,tableCanvas,status);
}

function saveCanvasAsImages(fullCanvas,cropCanvas,tableCanvas,status){
    canvasToBase64(fullCanvas).then(full=>{
        fullImageBase64=full.base64;

        canvasToBase64(cropCanvas).then(crop=>{
            cropImageBase64=crop.base64;

            canvasToBase64(tableCanvas).then(table=>{
                tableImageBase64=table.base64;

                document.getElementById("fullPreview").src=fullImageBase64;
                document.getElementById("cropPreview").src=cropImageBase64;
                document.getElementById("tablePreview").src=tableImageBase64;

                document.getElementById("tableInfo").innerHTML=
                    `Resolución tabla: <b>${tableCanvas.width} x ${tableCanvas.height}</b><br>
                     Tamaño: <b>${(table.size/1024).toFixed(1)} KB</b><br>
                     Este sería el candidato principal para Google Vision.`;

                document.getElementById("cropInfo").innerHTML=
                    `Resolución marco: <b>${cropCanvas.width} x ${cropCanvas.height}</b><br>
                     Tamaño: <b>${(crop.size/1024).toFixed(1)} KB</b><br>
                     Sirve como respaldo si el recorte PEDALES queda incompleto.`;

                document.getElementById("fullInfo").innerHTML=
                    `Resolución completa: <b>${fullCanvas.width} x ${fullCanvas.height}</b><br>
                     Tamaño: <b>${(full.size/1024).toFixed(1)} KB</b>`;

                localStorage.setItem("ocrFrameLabTableImage",tableImageBase64);
                localStorage.setItem("ocrFrameLabCropImage",cropImageBase64);
                localStorage.setItem("ocrFrameLabFullImage",fullImageBase64);

                status.innerText="Captura lista. Toca Ver resultado.";
            });
        });
    });
}

function canvasToBase64(canvas){
    return new Promise(resolve=>{
        canvas.toBlob(blob=>{
            const reader=new FileReader();
            reader.onload=e=>resolve({
                base64:e.target.result,
                size:blob.size
            });
            reader.readAsDataURL(blob);
        },"image/jpeg",0.92);
    });
}

function showResults(){
    if(!tableImageBase64){
        document.getElementById("status").innerText="Primero toma una foto.";
        return;
    }
    document.getElementById("cameraView").style.display="none";
    document.getElementById("resultsView").style.display="block";
}

function backToCamera(){
    document.getElementById("resultsView").style.display="none";
    document.getElementById("cameraView").style.display="flex";
}

window.addEventListener("load",()=>{
    if(location.protocol==="https:" || location.hostname==="localhost"){
        startCamera();
    }else{
        document.getElementById("status").innerText=
            "Para usar cámara necesitas HTTPS. En GitHub Pages funcionará.";
    }
});

window.addEventListener("beforeunload",()=>stopCamera());
</script>

</body>
</html>
