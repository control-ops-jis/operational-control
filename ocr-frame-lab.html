<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL OCR Frame Lab V4</title>

<style>
:root{--dhl-red:#D40511;--dhl-yellow:#FFCC00;--ok:#1f7a1f;}
*{box-sizing:border-box;font-family:Arial,sans-serif;}
body{margin:0;background:#111;color:white;}
header{height:52px;background:var(--dhl-yellow);color:var(--dhl-red);display:flex;align-items:center;justify-content:center;font-weight:900;}
.lab-wrap{height:calc(100vh - 52px);display:flex;flex-direction:column;overflow:hidden;}
.camera-stage{position:relative;flex:1;background:#000;overflow:hidden;}
video{width:100%;height:100%;object-fit:cover;}
.guide-frame{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:92%;max-width:760px;aspect-ratio:1.62/1;border:4px solid white;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.45),0 0 18px rgba(255,255,255,.35);}
.guide-frame::before,.guide-frame::after{content:"";position:absolute;width:34px;height:34px;border-color:var(--dhl-yellow);border-style:solid;}
.guide-frame::before{left:-5px;top:-5px;border-width:5px 0 0 5px;border-radius:16px 0 0 0;}
.guide-frame::after{right:-5px;bottom:-5px;border-width:0 5px 5px 0;border-radius:0 0 16px 0;}
.guide-title{position:absolute;top:14px;width:100%;text-align:center;font-size:18px;font-weight:900;text-shadow:0 2px 6px #000;}
.guide-help{position:absolute;bottom:16px;width:100%;padding:0 18px;text-align:center;font-size:13px;font-weight:bold;text-shadow:0 2px 6px #000;}
.bottom-panel{background:#171717;padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
button{border:none;border-radius:14px;padding:13px 8px;font-weight:900;font-size:14px;cursor:pointer;}
.primary-btn{background:var(--dhl-red);color:white;}
.secondary-btn{background:#eee;color:#111;}
.ok-btn{background:var(--ok);color:white;}
.status{grid-column:1/-1;font-size:12px;text-align:center;font-weight:bold;color:#ddd;}
.results{display:none;height:calc(100vh - 52px);overflow:auto;padding:12px;background:#111;}
.card{background:#1d1d1d;border-radius:18px;padding:12px;margin-bottom:12px;}
.card h3{margin:0 0 10px;color:var(--dhl-yellow);}
.card img{width:100%;border-radius:14px;border:2px solid white;}
.info{font-size:13px;color:#ddd;line-height:1.45;}
.actions{display:flex;gap:8px;margin-bottom:12px;}
.actions button{flex:1;}
pre{white-space:pre-wrap;max-height:220px;overflow:auto;background:#000;padding:10px;border-radius:12px;font-size:12px;}
table{width:100%;border-collapse:collapse;background:white;color:#111;margin-top:10px;border-radius:12px;overflow:hidden;}
th,td{border-bottom:1px solid #ddd;padding:7px;text-align:center;font-size:12px;}
th{background:#fff2a8;}
canvas{display:none;}
</style>
</head>

<body>

<header>📷 DHL OCR Frame Lab V4</header>

<div class="lab-wrap" id="cameraView">
    <div class="camera-stage" id="cameraStage">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <div class="guide-title">Enmarca la etiqueta completa</div>
        <div class="guide-frame" id="guideFrame"></div>
        <div class="guide-help">Se probará OCR sobre recorte PEDALES, marco y foto completa.</div>
    </div>

    <div class="bottom-panel">
        <button class="secondary-btn" onclick="startCamera()">Cámara</button>
        <button class="primary-btn" onclick="captureAndCrop()">Tomar</button>
        <button class="ok-btn" onclick="showResults()">Resultado</button>
        <div class="status" id="status">Lab aislado. No usa Firebase ni Containers.</div>
    </div>
</div>

<div class="results" id="resultsView">
    <div class="actions">
        <button class="secondary-btn" onclick="backToCamera()">Repetir</button>
        <button class="primary-btn" onclick="runVisionTests()">Probar Vision</button>
    </div>

    <div class="card">
        <h3>1. Recorte PEDALES estimado</h3>
        <img id="tablePreview">
        <div class="info" id="tableInfo"></div>
        <div id="tableVision"></div>
    </div>

    <div class="card">
        <h3>2. Recorte marco completo</h3>
        <img id="cropPreview">
        <div class="info" id="cropInfo"></div>
        <div id="cropVision"></div>
    </div>

    <div class="card">
        <h3>3. Foto completa</h3>
        <img id="fullPreview">
        <div class="info" id="fullInfo"></div>
        <div id="fullVision"></div>
    </div>
</div>

<canvas id="fullCanvas"></canvas>
<canvas id="cropCanvas"></canvas>
<canvas id="tableCanvas"></canvas>

<script>
const GOOGLE_VISION_API_KEY = "AIzaSyAnwzJ7dXjobIcmdzv7b44iZhfjISJhZP4";

let stream=null;
let fullImageBase64="";
let cropImageBase64="";
let tableImageBase64="";

async function startCamera(){
    const status=document.getElementById("status");
    try{
        stopCamera();
        status.innerText="Solicitando cámara trasera...";
        stream=await navigator.mediaDevices.getUserMedia({
            video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}},
            audio:false
        });
        const video=document.getElementById("cameraVideo");
        video.srcObject=stream;
        await video.play();
        status.innerText="Cámara activa. Encuadra la etiqueta completa.";
    }catch(error){
        console.error(error);
        status.innerText="No fue posible abrir cámara. Usa HTTPS/GitHub Pages.";
    }
}

function stopCamera(){
    if(!stream)return;
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
}

function captureAndCrop(){
    const video=document.getElementById("cameraVideo");
    const guide=document.getElementById("guideFrame");
    const stage=document.getElementById("cameraStage");
    const status=document.getElementById("status");

    if(!video.videoWidth){
        status.innerText="Primero inicia la cámara.";
        return;
    }

    const fullCanvas=document.getElementById("fullCanvas");
    const cropCanvas=document.getElementById("cropCanvas");
    const tableCanvas=document.getElementById("tableCanvas");

    fullCanvas.width=video.videoWidth;
    fullCanvas.height=video.videoHeight;
    fullCanvas.getContext("2d").drawImage(video,0,0,fullCanvas.width,fullCanvas.height);

    const stageRect=stage.getBoundingClientRect();
    const guideRect=guide.getBoundingClientRect();

    const videoRatio=video.videoWidth/video.videoHeight;
    const stageRatio=stageRect.width/stageRect.height;

    let rw,rh,ox,oy;

    if(videoRatio>stageRatio){
        rh=stageRect.height;
        rw=stageRect.height*videoRatio;
        ox=(stageRect.width-rw)/2;
        oy=0;
    }else{
        rw=stageRect.width;
        rh=stageRect.width/videoRatio;
        ox=0;
        oy=(stageRect.height-rh)/2;
    }

    const scaleX=video.videoWidth/rw;
    const scaleY=video.videoHeight/rh;

    let sx=(guideRect.left-stageRect.left-ox)*scaleX;
    let sy=(guideRect.top-stageRect.top-oy)*scaleY;
    let sw=guideRect.width*scaleX;
    let sh=guideRect.height*scaleY;

    sx=Math.max(0,sx);
    sy=Math.max(0,sy);
    sw=Math.min(video.videoWidth-sx,sw);
    sh=Math.min(video.videoHeight-sy,sh);

    cropCanvas.width=Math.round(sw);
    cropCanvas.height=Math.round(sh);
    cropCanvas.getContext("2d").drawImage(video,sx,sy,sw,sh,0,0,cropCanvas.width,cropCanvas.height);

    const tableX=cropCanvas.width*0.03;
    const tableY=cropCanvas.height*0.36;
    const tableW=cropCanvas.width*0.78;
    const tableH=cropCanvas.height*0.56;

    tableCanvas.width=Math.round(tableW);
    tableCanvas.height=Math.round(tableH);
    tableCanvas.getContext("2d").drawImage(cropCanvas,tableX,tableY,tableW,tableH,0,0,tableCanvas.width,tableCanvas.height);

    Promise.all([
        canvasToBase64(fullCanvas),
        canvasToBase64(cropCanvas),
        canvasToBase64(tableCanvas)
    ]).then(([full,crop,table])=>{
        fullImageBase64=full.base64;
        cropImageBase64=crop.base64;
        tableImageBase64=table.base64;

        document.getElementById("fullPreview").src=fullImageBase64;
        document.getElementById("cropPreview").src=cropImageBase64;
        document.getElementById("tablePreview").src=tableImageBase64;

        document.getElementById("tableInfo").innerHTML=`Resolución: <b>${tableCanvas.width} x ${tableCanvas.height}</b><br>Tamaño: <b>${(table.size/1024).toFixed(1)} KB</b><br>Candidato principal para OCR.`;
        document.getElementById("cropInfo").innerHTML=`Resolución: <b>${cropCanvas.width} x ${cropCanvas.height}</b><br>Tamaño: <b>${(crop.size/1024).toFixed(1)} KB</b><br>Respaldo si falla recorte PEDALES.`;
        document.getElementById("fullInfo").innerHTML=`Resolución: <b>${fullCanvas.width} x ${fullCanvas.height}</b><br>Tamaño: <b>${(full.size/1024).toFixed(1)} KB</b>`;

        status.innerText="Captura lista. Toca Resultado.";
    });
}

function canvasToBase64(canvas){
    return new Promise(resolve=>{
        canvas.toBlob(blob=>{
            const reader=new FileReader();
            reader.onload=e=>resolve({base64:e.target.result,size:blob.size});
            reader.readAsDataURL(blob);
        },"image/jpeg",0.92);
    });
}

function showResults(){
    if(!tableImageBase64){
        document.getElementById("status").innerText="Primero toma una foto.";
        return;
    }
    document.getElementById("cameraView").style.display="none";
    document.getElementById("resultsView").style.display="block";
}

function backToCamera(){
    document.getElementById("resultsView").style.display="none";
    document.getElementById("cameraView").style.display="flex";
}

async function runVisionTests(){
    if(!GOOGLE_VISION_API_KEY || GOOGLE_VISION_API_KEY.includes("PEGA_AQUI")){
        alert("Coloca tu API Key en GOOGLE_VISION_API_KEY.");
        return;
    }

    await testOneVision("table",tableImageBase64,"tableVision");
    await testOneVision("crop",cropImageBase64,"cropVision");
    await testOneVision("full",fullImageBase64,"fullVision");
}

async function testOneVision(label,base64WithHeader,targetId){
    const target=document.getElementById(targetId);
    target.innerHTML=`<div class="info">Procesando Vision...</div>`;

    try{
        const base64=base64WithHeader.split(",")[1];

        const response=await fetch(
            `https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_VISION_API_KEY}`,
            {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    requests:[{
                        image:{content:base64},
                        features:[{type:"TEXT_DETECTION",maxResults:1}]
                    }]
                })
            }
        );

        const result=await response.json();

        if(!response.ok || result.error){
            throw new Error(result.error?.message || "Error Vision");
        }

        const text=
            result?.responses?.[0]?.fullTextAnnotation?.text ||
            result?.responses?.[0]?.textAnnotations?.[0]?.description ||
            "";

        const rows=parsePedalesTemplate(text);

        target.innerHTML=renderVisionResult(label,text,rows);

    }catch(error){
        console.error(error);
        target.innerHTML=`
            <div class="card" style="background:#3a1b1b;">
                <h3>Error Vision</h3>
                <div class="info">${error.message}</div>
            </div>
        `;
    }
}

function renderVisionResult(label,text,rows){
    return `
        <div class="card">
            <h3>Resultado Vision</h3>
            <div class="info">
                Texto detectado: <b>${text ? "Sí" : "No"}</b><br>
                Filas PEDALES detectadas: <b>${rows.length}</b>
            </div>

            ${
                rows.length
                ? `
                    <table>
                        <thead>
                            <tr>
                                <th>Pos.</th>
                                <th>Sec.</th>
                                <th>Parte</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(row=>`
                                <tr>
                                    <td>${row.position}</td>
                                    <td>${row.sequence}</td>
                                    <td>${row.partNumber}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                `
                : ""
            }

            <details style="margin-top:10px;">
                <summary><b>Ver texto Vision</b></summary>
                <pre>${escapeHtml(text || "Sin texto")}</pre>
            </details>
        </div>
    `;
}

function parsePedalesTemplate(text){
    const lines=String(text||"")
        .split("\n")
        .map(line=>line.replace(/\s+/g," ").trim())
        .filter(Boolean);

    const rows=[];

    for(let i=0;i<lines.length;i++){
        const line=lines[i];

        const inlineMatch=line.match(/^(\d{1,2})\s+(\d{4})\s+(.+)$/);

        if(inlineMatch){
            const position=Number(inlineMatch[1]);
            const sequence=inlineMatch[2];
            const partNumber=normalizePartNumber(inlineMatch[3]);

            if(isValidPedalesRow(position,sequence,partNumber)){
                rows.push({position,sequence,partNumber,source:"inline"});
            }
            continue;
        }

        if(!/^\d{1,2}$/.test(line))continue;

        const sequenceLine=lines[i+1] || "";
        const partLine=lines[i+2] || "";

        if(!/^\d{4}$/.test(sequenceLine))continue;

        const position=Number(line);
        const sequence=sequenceLine;
        const partNumber=normalizePartNumber(partLine);

        if(isValidPedalesRow(position,sequence,partNumber)){
            rows.push({position,sequence,partNumber,source:"split"});
        }

        i=i+2;
    }

    return rows
        .filter((row,index,self)=>index===self.findIndex(x=>x.position===row.position))
        .sort((a,b)=>a.position-b.position);
}

function normalizePartNumber(value){
    const clean=String(value||"").replace(/\s+/g," ").trim().toUpperCase();

    const match=clean.match(/\b([A-Z0-9]{2,4}\s*723\s*058(?:\s*[A-Z])?)\b/);

    if(match){
        return match[1].replace(/\s+/g," ").trim();
    }

    return clean;
}

function isValidPedalesRow(position,sequence,partNumber){
    if(position<1 || position>99)return false;
    if(!/^\d{4}$/.test(sequence))return false;
    if(!partNumber)return false;

    if(
        partNumber.includes("MODEL") ||
        partNumber.includes("TOTAL") ||
        partNumber.includes("LINEA") ||
        partNumber.includes("PEDALES") ||
        partNumber.includes("SEC") ||
        partNumber.includes("NUM")
    ){
        return false;
    }

    return true;
}

function escapeHtml(value){
    return String(value||"")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

window.addEventListener("load",()=>{
    if(location.protocol==="https:" || location.hostname==="localhost"){
        startCamera();
    }else{
        document.getElementById("status").innerText="Para usar cámara necesitas HTTPS.";
    }
});

window.addEventListener("beforeunload",()=>stopCamera());
</script>

</body>
</html>
